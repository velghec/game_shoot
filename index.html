<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Space Survival Ultra</title>
<style>
body { margin: 0; overflow: hidden; background: black; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

const player = {
    x: canvas.width/2,
    y: canvas.height-80,
    size: 40,
    speed: 7,
    health: 10
};

let bullets = [];
let enemies = [];
let enemyBullets = [];
let stars = [];
let planets = [];
let explosions = [];
let shockwaves = [];

let score = 0;
let level = 1;
let spawnInterval = 2000;
let playerHitCooldown = 0;
let powerMode = false;
let powerTimer = 0;

//////////////////////
// 🌌 FOND SPATIAL
//////////////////////

for (let i = 0; i < 100; i++) {
    stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        speed: Math.random()*1 + 0.2,
        size: Math.random()*2
    });
}

for (let i = 0; i < 3; i++) {
    planets.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        radius: 60 + Math.random()*40,
        speed: 0.2 + Math.random()*0.3,
        color: ["#5DADE2","#AF7AC5","#F5B041"][i]
    });
}

//////////////////////
// 💥 EXPLOSIONS
//////////////////////

function createExplosion(x, y, color="orange", power=20){
    for(let i = 0; i < power; i++){
        explosions.push({
            x, y,
            dx: (Math.random()-0.5)*6,
            dy: (Math.random()-0.5)*6,
            life: 30 + Math.random()*10,
            size: Math.random()*4+2,
            color
        });
    }
}

function createShockwave(x, y, color="cyan"){
    shockwaves.push({
        x, y,
        radius: 0,
        alpha: 1,
        color
    });
}

//////////////////////
// 🎮 CONTROLES
//////////////////////

const keys = {};
document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

canvas.addEventListener("click", ()=>{
    bullets.push({
        x: player.x,
        y: player.y,
        radius: 5,
        speed: 8,
        trail: []
    });
});

canvas.addEventListener("contextmenu", e=>{
    e.preventDefault();
    createExplosion(player.x, player.y, "cyan", 40);
    createShockwave(player.x, player.y);
    enemies = enemies.filter(en=>{
        const dx=en.x-player.x, dy=en.y-player.y;
        return Math.sqrt(dx*dx+dy*dy) > 150;
    });
});

//////////////////////
// 👾 SPAWN ENNEMIS
//////////////////////

function spawnEnemy(){
    const isBoss = Math.random() < 0.1;

    enemies.push({
        x: Math.random()*canvas.width,
        y: -30,
        radius: isBoss ? 30 : 15,
        speed: isBoss ? 1.2 : 2,
        color: isBoss ? "purple" : "red",
        health: isBoss ? 6 : 3,
        isBoss,
        shootCooldown: isBoss ? 120 : 0
    });
}

let enemySpawner = setInterval(spawnEnemy, spawnInterval);

//////////////////////
// 🔄 UPDATE
//////////////////////

function update(){

    if(keys["ArrowLeft"]) player.x -= player.speed;
    if(keys["ArrowRight"]) player.x += player.speed;

    if(playerHitCooldown>0) playerHitCooldown--;

    // étoiles
    stars.forEach(s=>{
        s.y += s.speed;
        if(s.y>canvas.height){ s.y=0; s.x=Math.random()*canvas.width; }
    });

    // planètes
    planets.forEach(p=>{
        p.y += p.speed;
        if(p.y-p.radius>canvas.height){
            p.y=-p.radius;
            p.x=Math.random()*canvas.width;
        }
    });

    // balles joueur + traînée
    bullets.forEach((b,i)=>{
        b.y -= b.speed;

        b.trail.push({x:b.x,y:b.y});
        if(b.trail.length>8) b.trail.shift();

        if(b.y<0) bullets.splice(i,1);
    });

    // ennemis
    enemies.forEach((e,i)=>{
        e.y += e.speed;

        if(e.isBoss){
            e.shootCooldown--;
            if(e.shootCooldown<=0){
                enemyBullets.push({x:e.x,y:e.y,radius:5,speed:4});
                e.shootCooldown=120;
            }
        }

        const dx=e.x-player.x, dy=e.y-player.y;
        if(Math.sqrt(dx*dx+dy*dy)<player.size/2+e.radius && playerHitCooldown<=0){
            player.health -= e.isBoss?2:1;
            createExplosion(player.x,player.y,"white",15);
            playerHitCooldown=30;
        }

        if(e.y>canvas.height+50) enemies.splice(i,1);
    });

    // tirs ennemis
    enemyBullets.forEach((b,i)=>{
        b.y += b.speed;
        const dx=b.x-player.x, dy=b.y-player.y;
        if(Math.sqrt(dx*dx+dy*dy)<player.size/2+b.radius){
            player.health--;
            createExplosion(player.x,player.y,"orange",10);
            enemyBullets.splice(i,1);
        }
        if(b.y>canvas.height) enemyBullets.splice(i,1);
    });

    // collisions
    bullets.forEach((b,bi)=>{
        enemies.forEach((e,ei)=>{
            const dx=b.x-e.x, dy=b.y-e.y;
            if(Math.sqrt(dx*dx+dy*dy)<e.radius){
                e.health--;
                bullets.splice(bi,1);
                createExplosion(b.x,b.y,"yellow",8);

                if(e.health<=0){
                    createExplosion(e.x,e.y,e.isBoss?"purple":"red", e.isBoss?40:15);
                    createShockwave(e.x,e.y,e.isBoss?"purple":"red");
                    enemies.splice(ei,1);
                    score += e.isBoss?50:10;

                    if(score % 100 === 0){
                        powerMode=true;
                        powerTimer=300;
                    }
                }
            }
        });
    });

    // update explosions
    explosions.forEach((p,i)=>{
        p.x+=p.dx; p.y+=p.dy; p.life--; p.size*=0.96;
        if(p.life<=0) explosions.splice(i,1);
    });

    // update shockwaves
    shockwaves.forEach((s,i)=>{
        s.radius+=6;
        s.alpha-=0.02;
        if(s.alpha<=0) shockwaves.splice(i,1);
    });

    if(powerMode){
        powerTimer--;
        if(powerTimer<=0) powerMode=false;
    }

    if(score>=level*200){
        level++;
        spawnInterval=Math.max(500,spawnInterval-200);
        clearInterval(enemySpawner);
        enemySpawner=setInterval(spawnEnemy,spawnInterval);
    }

    if(player.health<=0){
        alert("Game Over — Score: "+score);
        location.reload();
    }
}

//////////////////////
// 🎨 DRAW
//////////////////////

function draw(){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // étoiles
    ctx.fillStyle="white";
    stars.forEach(s=>ctx.fillRect(s.x,s.y,s.size,s.size));

    // planètes
    planets.forEach(p=>{
        ctx.fillStyle=p.color;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
        ctx.fill();
    });

    // ondes de choc
    shockwaves.forEach(s=>{
        ctx.strokeStyle=s.color;
        ctx.globalAlpha=s.alpha;
        ctx.lineWidth=3;
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);
        ctx.stroke();
        ctx.globalAlpha=1;
    });

    // explosions
    explosions.forEach(p=>{
        ctx.fillStyle=p.color;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
    });

    // joueur
    ctx.fillStyle=powerMode?"cyan":"white";
    ctx.fillRect(player.x-player.size/2,player.y-player.size/2,player.size,player.size);

    // balles + traînées
    bullets.forEach(b=>{
        ctx.strokeStyle="yellow";
        ctx.lineWidth=2;
        ctx.beginPath();
        b.trail.forEach((t,i)=>{
            if(i===0) ctx.moveTo(t.x,t.y);
            else ctx.lineTo(t.x,t.y);
        });
        ctx.stroke();

        ctx.fillStyle="yellow";
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
        ctx.fill();
    });

    // tirs ennemis
    ctx.fillStyle="orange";
    enemyBullets.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
        ctx.fill();
    });

    // ennemis
    enemies.forEach(e=>{
        ctx.fillStyle=e.color;
        ctx.beginPath();
        ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);
        ctx.fill();
    });

    // UI
    ctx.fillStyle="white";
    ctx.font="20px Arial";
    ctx.fillText("Score: "+score,20,30);
    ctx.fillText("Vie: "+player.health,20,60);
    ctx.fillText("Niveau: "+level,20,90);
    if(powerMode) ctx.fillText("POWER MODE!", canvas.width/2-70,40);
}

function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
